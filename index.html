<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONNECT & EARN</title>
<style>
    * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; }
  .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: 20px auto; box-shadow: 0 0 15px rgba(34,197,94,0.2); }
  input, button { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; }
  button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
  button:hover { background: #16a34a; }
  .btn-danger { background: #ef4444; }
  .btn-danger:hover { background: #dc2626; }
  .btn-paid { background: #3b82f6; }
  .link { background: #334155; padding: 10px; border-radius: 6px; word-break: break-all; font-size: 14px; }
  h1 { color: #22c55e; }
  .user-card { background: #0f172a; padding: 15px; margin: 10px 0; border-radius: 8px; text-align: left; }
  .status { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
  .pending { background: #f59e0b; color: black; }
  .paid { background: #22c55e; color: white; }
  .history-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #334155; }
  .filter-btn { width: 30%; padding: 8px; margin: 5px; }
</style>
</head>
<body>

<!-- USER PANEL -->
<div id="user-panel">
  <h1>💰 CONNECT & EARN</h1>
  <p>Earn UGX 1000 for every friend you refer!</p>

  <div class="box" id="signup-box">
    <h2>Sign Up</h2>
    <input type="text" id="name" placeholder="Your Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number: 07xxxxxxxx" required>
    <button onclick="signUp()">Join & Get My Link</button>
    <p><a href="#" onclick="showAdmin()" style="color:#22c55e;">Admin Login</a></p>
  </div>

  <div class="box" id="dashboard" style="display:none;">
    <h2>Welcome <span id="user-name"></span> 👋</h2>
    <p><b>Total Earnings:</b> UGX <span id="earnings">0</span></p>
    <p><b>Paid Out:</b> UGX <span id="paidOut">0</span></p>
    <p><b>Pending:</b> UGX <span id="pending">0</span></p>
    <h3>Your Referral Link:</h3>
    <div class="link" id="ref-link"></div>
    <button onclick="copyLink()">Copy Link</button>
    <button onclick="logout()" class="btn-danger">Logout</button>

    <h3 style="margin-top:20px;">My Referral History</h3>
    <div id="history-list"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none;">
  <div class="box">
    <h1>ADMIN PANEL</h1>
    <div id="admin-login">
      <input type="password" id="admin-pass" placeholder="Admin Password">
      <button onclick="adminLogin()">Login Admin</button>
    </div>
    
    <div id="admin-dashboard" style="display:none;">
      <h2 style="color:#ef4444;">Total Owed to Referrers: UGX <span id="total-owed">0</span></h2>
      
      <div>
        <button class="filter-btn" onclick="loadAdmin('all')">All</button>
        <button class="filter-btn" style="background:#f59e0b;" onclick="loadAdmin('pending')">Unpaid Only</button>
        <button class="filter-btn" style="background:#22c55e;" onclick="loadAdmin('paid')">Paid Only</button>
      </div>

      <p><b>All Users: <span id="user-count">0</span></b></p>
      <div id="admin-user-list"></div>
      <button onclick="showUserPanel()" class="btn-danger">Logout Admin</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBItj0VrE8gSX2PT6_DPl15cpJpzBGLC64",
    authDomain: "connect-and-earn.firebaseapp.com",
    databaseURL: "https://connect-and-earn-default-rtdb.firebaseio.com",
    projectId: "connect-and-earn",
    storageBucket: "connect-and-earn.firebasestorage.app",
    messagingSenderId: "135263410032",
    appId: "1:135263410032:web:5d5891c7c4f133314521b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const ADMIN_PASSWORD = "admin123"; // CHANGE THIS

  const urlParams = new URLSearchParams(window.location.search);
  const referrerId = urlParams.get('ref');

  function signUp() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if(!name || !phone) return alert("Please fill all fields");
    
    const userId = phone.replace(/[^0-9]/g, '');
    localStorage.setItem('userId', userId);
    
    // Create referral record
    const newRefId = Date.now();
    set(ref(db, 'referrals/' + newRefId), {
      invitedName: name,
      invitedPhone: phone,
      invitedBy: referrerId,
      status: "pending", // pending or paid
      amount: 1000,
      date: Date.now()
    });

    // Update referrer stats
    if(referrerId){
      get(child(ref(db), `users/${referrerId}`)).then((snap) => {
        const currentPending = snap.val()?.pending || 0;
        update(ref(db, 'users/' + referrerId), {
          pending: currentPending + 1000
        });
      });
    }

    // Save user
    set(ref(db, 'users/' + userId), {
      name: name,
      phone: phone,
      earnings: 0,
      paidOut: 0,
      pending: 0
    });

    loadDashboard(userId, name);
  }

  function loadDashboard(userId, name) {
    document.getElementById('signup-box').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('user-name').innerText = name;
    
    const link = window.location.origin + window.location.pathname + "?ref=" + userId;
    document.getElementById('ref-link').innerText = link;

    onValue(ref(db, `users/${userId}`), (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        document.getElementById('earnings').innerText = (data.paidOut || 0) + (data.pending || 0);
        document.getElementById('paidOut').innerText = data.paidOut || 0;
        document.getElementById('pending').innerText = data.pending || 0;
      }
    });

    // Load history
    onValue(ref(db, 'referrals'), (snapshot) => {
      let html = "";
      snapshot.forEach((child) => {
        const r = child.val();
        if(r.invitedBy === userId){
          html += `<div class="history-item">
            <div>${r.invitedName} - ${r.invitedPhone}</div>
            <div><span class="status ${r.status}">${r.status.toUpperCase()}</span> UGX ${r.amount}</div>
          </div>`;
        }
      });
      document.getElementById('history-list').innerHTML = html || "No referrals yet";
    });
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
    alert("Link Copied!");
  }

  function logout() {
    localStorage.removeItem('userId');
    location.reload();
  }

  // ADMIN FUNCTIONS
  function showAdmin() {
    document.getElementById('user-panel').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
  }
  function showUserPanel() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('user-panel').style.display = 'block';
  }

  function adminLogin() {
    if(document.getElementById('admin-pass').value === ADMIN_PASSWORD){
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'block';
      loadAdmin('all');
    } else { alert("Wrong Password"); }
  }

  function loadAdmin(filter) {
    onValue(ref(db, 'referrals'), (snapshot) => {
      let html = "";
      let totalOwed = 0;
      let count = 0;
      snapshot.forEach((child) => {
        const r = child.val();
        const refId = child.key;
        if(filter === 'pending' && r.status !== 'pending') return;
        if(filter === 'paid' && r.status !== 'paid') return;
        
        count++;
        if(r.status === 'pending') totalOwed += r.amount;

        const invitedByName = r.invitedBy ? "User: " + r.invitedBy : "None";
        html += `<div class="user-card">
          <b>${r.invitedName}</b> <br>
          ${r.invitedPhone} <br>
          Invited by: ${invitedByName} <br>
          Amount: UGX ${r.amount} 
          <span class="status ${r.status}" style="float:right;">${r.status.toUpperCase()}</span>
          ${r.status === 'pending' ? `<button class="btn-paid" onclick="markPaid('${refId}', '${r.invitedBy}', ${r.amount})">Mark Paid</button>` : ''}
        </div>`;
      });
      document.getElementById('admin-user-list').innerHTML = html;
      document.getElementById('user-count').innerText = count;
      document.getElementById('total-owed').innerText = totalOwed;
    });
  }

  function markPaid(refId, userId, amount) {
    if(!confirm("Mark this referral as PAID?")) return;
    
    // 1. Update referral status
    update(ref(db, 'referrals/' + refId), { status: "paid" });
    
    // 2. Move money from pending to paidOut for user
    get(child(ref(db), `users/${userId}`)).then((snap) => {
      const data = snap.val();
      update(ref(db, 'users/' + userId), {
        pending: (data.pending || 0) - amount,
        paidOut: (data.paidOut || 0) + amount
      });
    });
    alert("Marked as PAID! User dashboard will update automatically.");
  }

  // Auto login
  const savedUser = localStorage.getItem('userId');
  if(savedUser){
    get(child(ref(db), `users/${savedUser}`)).then((snapshot) => {
      if (snapshot.exists()) {
        loadDashboard(savedUser, snapshot.val().name);
      }
    });
  }
</script>

</body>
</html>
